<div class="card mb-3">
  <div class="card-header border-0">
    <div class="row g-4">
      <div class="col">
        <div>
          <button
            (click)="createProduct()"
            class="btn btn-success"
            id="addproduct-btn"
          >
            <i class="ri-add-line align-bottom me-1"></i> إضافة منتج
          </button>
        </div>
      </div>
      <div class="col">
        <div class="d-flex justify-content-sm-end">
          <input
            type="search"
            type="text"
            placeholder="اسم المنتج"
            class="form-control"
          />
        </div>
      </div>
    </div>
  </div>
</div>

<div class="card" style="overflow-x: scroll">
  <div class="card-body">
    <table class="table table-striped table-bordered" style="min-width: 1400">
      <thead>
        <tr class="table-secondary">
          <th scope="col">الاسم</th>
          <th scope="col">السعر</th>
          <th scope="col">الكمية</th>
          <th scope="col">التكلفة</th>
          <th scope="col">التاريخ</th>
          <th scope="col">تعديل</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products; let i = index">
          <td style="min-width: 150px">{{ product.name }}</td>
          <td style="min-width: 90px">{{ product.price }}</td>
          <td style="min-width: 90px">{{ product.stock }}</td>
          <td style="min-width: 90px">{{ product.cost }}</td>
          <td style="min-width: 90px">
            {{ product.published | date : "short" }}
          </td>
          <td>
            <div ngbDropdown>
              <button
                class="btn btn-secondary btn-sm dropdown"
                type="button"
                ngbDropdownToggle
              >
                تعديل
              </button>
              <ul ngbDropdownMenu>
                <li>
                  <button
                    (click)="onEdit(product)"
                    class="dropdown-item"
                    href="#"
                  >
                    <i class="ri-pencil-fill align-bottom me-2 text-muted"></i>
                    تعديل
                  </button>
                </li>
                <li>
                  <button
                    (click)="onDelete(product, i)"
                    class="dropdown-item"
                    href="#"
                  >
                    <i
                      class="ri-delete-bin-fill align-bottom me-2 text-danger"
                    ></i>
                    مسح
                  </button>
                </li>
              </ul>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<app-create-product-modal></app-create-product-modal>
<app-update-product-modal></app-update-product-modal>
