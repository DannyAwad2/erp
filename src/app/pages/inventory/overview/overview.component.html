<div class="row">
  <div class="col-xl-3 col-md-6">
    <!-- card -->

    <a [routerLink]="['/purchases/new']" class="card card-animate bg-primary">
      <div class="card-body">
        <h4 class="fs-22 fw-bold ff-secondary text-white text-center p-5">
          شراء
        </h4>
      </div>
      <!-- end card body -->
    </a>
    <!-- end card -->
  </div>
  <!-- end col -->

  <div class="col-xl-3 col-md-6">
    <!-- card -->
    <div class="card card-animate bg-secondary">
      <div class="card-body">
        <div class="d-flex align-items-center">
          <div class="flex-grow-1 overflow-hidden">
            <p class="text-uppercase fw-bold text-white-50 text-truncate mb-0">
              Orders
            </p>
          </div>
          <div class="flex-shrink-0">
            <h5 class="text-white fs-14 mb-0">
              <i class="ri-arrow-right-down-line fs-13 align-middle"></i> -3.57
              %
            </h5>
          </div>
        </div>
        <div class="d-flex align-items-end justify-content-between mt-4">
          <div>
            <h4 class="fs-22 fw-bold ff-secondary text-white mb-4">
              <span class="counter-value" data-target="36894">36,894</span>
            </h4>
            <a href="" class="text-decoration-underline text-white-50"
              >View all orders</a
            >
          </div>
          <div class="avatar-sm flex-shrink-0">
            <span class="avatar-title bg-soft-light rounded fs-3">
              <i class="bx bx-shopping-bag text-white"></i>
            </span>
          </div>
        </div>
      </div>
      <!-- end card body -->
    </div>
    <!-- end card -->
  </div>
  <!-- end col -->

  <div class="col-xl-3 col-md-6">
    <!-- card -->
    <div class="card card-animate bg-success">
      <div class="card-body">
        <div class="d-flex align-items-center">
          <div class="flex-grow-1 overflow-hidden">
            <p class="text-uppercase fw-bold text-white-50 text-truncate mb-0">
              Customers
            </p>
          </div>
          <div class="flex-shrink-0">
            <h5 class="text-white fs-14 mb-0">
              <i class="ri-arrow-right-up-line fs-13 align-middle"></i> +29.08 %
            </h5>
          </div>
        </div>
        <div class="d-flex align-items-end justify-content-between mt-4">
          <div>
            <h4 class="fs-22 fw-bold ff-secondary text-white mb-4">
              <span class="counter-value" data-target="183.35">183.35</span>M
            </h4>
            <a href="" class="text-decoration-underline text-white-50"
              >See details</a
            >
          </div>
          <div class="avatar-sm flex-shrink-0">
            <span class="avatar-title bg-soft-light rounded fs-3">
              <i class="bx bx-user-circle text-white"></i>
            </span>
          </div>
        </div>
      </div>
      <!-- end card body -->
    </div>
    <!-- end card -->
  </div>
  <!-- end col -->

  <div class="col-xl-3 col-md-6">
    <!-- card -->
    <div class="card card-animate bg-info">
      <div class="card-body">
        <div class="d-flex align-items-center">
          <div class="flex-grow-1 overflow-hidden">
            <p class="text-uppercase fw-bold text-white-50 text-truncate mb-0">
              My Balance
            </p>
          </div>
          <div class="flex-shrink-0">
            <h5 class="text-white fs-14 mb-0">+0.00 %</h5>
          </div>
        </div>
        <div class="d-flex align-items-end justify-content-between mt-4">
          <div>
            <h4 class="fs-22 fw-bold ff-secondary text-white mb-4">
              $<span class="counter-value" data-target="165.89">165.89</span>k
            </h4>
            <a href="" class="text-decoration-underline text-white-50"
              >Withdraw money</a
            >
          </div>
          <div class="avatar-sm flex-shrink-0">
            <span class="avatar-title bg-soft-light rounded fs-3">
              <i class="bx bx-wallet text-white"></i>
            </span>
          </div>
        </div>
      </div>
      <!-- end card body -->
    </div>
    <!-- end card -->
  </div>
  <!-- end col -->
</div>
